<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar | Share A Note</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="subpage-header">
    <div class="container subpage-header-inner">
      <div>
        <p class="eyebrow">Interactive Calendar</p>
        <h1>July 2025 Planner</h1>
        <p class="subtle">Select a day and add a task note to demonstrate the calendar workflow.</p>
      </div>
      <a href="home.html" class="btn btn-outline">Back to Dashboard</a>
    </div>
  </header>

  <main class="container section-tight">
    <section class="calendar-shell">
      <div class="calendar-weekdays">
        <span>Sun</span>
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
      </div>
      <div class="calendar-grid" id="calendarDays"></div>
    </section>
  </main>

  <div id="overlay" class="overlay"></div>
  <div id="taskModal" class="modal">
    <h3>Add Task</h3>
    <p class="muted">Day <span id="selectedDay"></span></p>
    <input type="text" id="taskInput" placeholder="Enter task description" />
    <div class="modal-actions">
      <button onclick="saveTask()" class="btn btn-primary">Save</button>
      <button onclick="closeModal()" class="btn btn-secondary">Cancel</button>
    </div>
  </div>

  <script>
    const calendarDays = document.getElementById("calendarDays");
    const taskModal = document.getElementById("taskModal");
    const overlay = document.getElementById("overlay");
    const selectedDaySpan = document.getElementById("selectedDay");
    const taskInput = document.getElementById("taskInput");
    let selectedDay = null;

    const firstDayOffset = 2; // July 2025 starts on Tuesday
    const totalDays = 31;

    for (let i = 0; i < firstDayOffset; i++) {
      const spacer = document.createElement("div");
      spacer.className = "calendar-spacer";
      calendarDays.appendChild(spacer);
    }

    for (let i = 1; i <= totalDays; i++) {
      const dayDiv = document.createElement("button");
      dayDiv.classList.add("calendar-day");
      dayDiv.dataset.day = i;
      dayDiv.innerHTML = `<span class="day-number">${i}</span>`;
      dayDiv.onclick = () => openModal(i, dayDiv);
      calendarDays.appendChild(dayDiv);
    }

    function openModal(day, element) {
      selectedDay = element;
      selectedDaySpan.textContent = day;
      taskInput.value = "";
      taskModal.style.display = "block";
      overlay.style.display = "block";
    }

    function closeModal() {
      taskModal.style.display = "none";
      overlay.style.display = "none";
    }

    function saveTask() {
      const task = taskInput.value.trim();
      if (task && selectedDay) {
        const existingNote = selectedDay.querySelector(".task-note");
        if (existingNote) {
          existingNote.remove();
        }
        const note = document.createElement("span");
        note.className = "task-note";
        note.textContent = task;
        selectedDay.appendChild(note);
      }
      closeModal();
    }

    overlay.addEventListener("click", closeModal);
  </script>
</body>
</html>
